<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Guard Innovations | IT, Network, Security & Surveillance</title>
  <meta name="description" content="Smart Guard Innovations provides managed IT, network infrastructure, cybersecurity, surveillance, access control, cloud and business continuity solutions across Canada." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --ink:#07111f;
      --navy:#0b1729;
      --midnight:#020817;
      --royal:#1747e8;
      --blue:#0b5cff;
      --sky:#39c8ff;
      --gold:#d7a84d;
      --green:#10b981;
      --paper:#f5f7fb;
      --soft:#eef4ff;
      --white:#ffffff;
      --slate:#607086;
      --muted:#8fa0b5;
      --line:#e2eaf4;
      --glass:rgba(255,255,255,.11);
      --darkLine:rgba(255,255,255,.14);
      --shadow:0 32px 90px rgba(7,17,31,.17);
      --softShadow:0 18px 50px rgba(7,17,31,.08);
      --radius:30px;
      --max:1240px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:Inter,Arial,sans-serif;color:var(--ink);background:#fff;line-height:1.55;overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}
    button,input,select,textarea{font-family:inherit}
    .container{width:min(var(--max),92%);margin:auto}

    .topbar{background:#06101f;color:#dbeafe;font-size:13px;border-bottom:1px solid rgba(255,255,255,.1)}
    .topbar .container{min-height:38px;display:flex;align-items:center;justify-content:space-between;gap:18px}
    .topbar strong{color:#f8d983}
    .topbar-right{display:flex;gap:22px;align-items:center;white-space:nowrap}

    .header{position:sticky;top:0;z-index:999;background:rgba(255,255,255,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
    .nav{height:82px;display:flex;align-items:center;justify-content:space-between;gap:20px}
    .brand{display:flex;align-items:center;gap:14px;min-width:max-content}
    .brand-mark{width:58px;height:58px;border-radius:19px;background:linear-gradient(135deg,#07111f,#0b5cff);display:grid;place-items:center;color:white;font-weight:950;box-shadow:0 18px 38px rgba(7,17,31,.24);overflow:hidden}
    .brand-mark img{height:52px;width:auto;object-fit:contain}
    .brand-title{font-weight:950;letter-spacing:-.55px;line-height:1.05}
    .brand-sub{display:block;color:var(--royal);font-size:11px;letter-spacing:2.3px;text-transform:uppercase;font-weight:950;margin-top:4px}
    .navlinks{display:flex;gap:24px;align-items:center;font-size:14px;font-weight:850;color:#25344a}
    .navlinks a{opacity:.82;transition:.25s;white-space:nowrap}
    .navlinks a:hover{opacity:1;color:var(--royal)}
    .nav-cta{background:linear-gradient(135deg,#07111f,#0b5cff);color:#fff!important;padding:13px 18px;border-radius:999px;opacity:1!important;box-shadow:0 16px 34px rgba(7,92,255,.24)}
    .menu-btn{display:none;border:0;background:var(--ink);color:white;border-radius:999px;padding:12px 16px;font-weight:900;cursor:pointer}
    .mobile-panel{display:none;position:fixed;inset:120px 18px auto 18px;background:white;border:1px solid var(--line);border-radius:24px;z-index:998;box-shadow:var(--shadow);padding:16px}
    .mobile-panel a{display:block;padding:14px 16px;font-weight:850;border-bottom:1px solid #eef2f7;color:#20314a}
    .mobile-panel a:last-child{border-bottom:0;background:var(--blue);color:white;border-radius:16px;text-align:center;margin-top:8px}

    .hero{position:relative;min-height:825px;display:flex;align-items:center;color:white;background:linear-gradient(90deg,rgba(2,8,23,.98),rgba(7,17,31,.86),rgba(7,17,31,.28)),url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=2400&q=90') center/cover;overflow:hidden}
    .hero:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 71% 20%,rgba(57,200,255,.25),transparent 25%),radial-gradient(circle at 82% 78%,rgba(215,168,77,.28),transparent 28%)}
    .hero:after{content:"";position:absolute;inset:-50%;background:linear-gradient(115deg,transparent 38%,rgba(255,255,255,.13),transparent 49%);animation:sweep 8.5s infinite}
    @keyframes sweep{0%{transform:translateX(-48%)}55%,100%{transform:translateX(58%)}}
    .hero .container{position:relative;z-index:2;display:grid;grid-template-columns:1.02fr .98fr;gap:54px;align-items:center}
    .eyebrow,.kicker{color:#f8d983;text-transform:uppercase;letter-spacing:2.7px;font-size:12px;font-weight:950;margin-bottom:18px}
    .hero h1{font-size:clamp(48px,7vw,96px);line-height:.92;letter-spacing:-5px;max-width:950px;margin-bottom:26px}
    .hero p{font-size:20px;color:#dbeafe;line-height:1.78;max-width:750px;margin-bottom:32px}
    .actions{display:flex;gap:14px;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#0b5cff,#1438a8);color:#fff;border:0;border-radius:999px;padding:15px 22px;font-weight:950;cursor:pointer;transition:.25s;box-shadow:0 16px 36px rgba(7,92,255,.25)}
    .btn:hover{transform:translateY(-3px);box-shadow:0 22px 50px rgba(7,92,255,.32)}
    .btn.secondary{background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.42);box-shadow:none}
    .btn.dark{background:var(--ink)}

    .hero-board{display:grid;grid-template-columns:1fr 1fr;gap:17px;transform:rotate(-1deg)}
    .hero-card{position:relative;min-height:215px;border-radius:30px;overflow:hidden;border:1px solid rgba(255,255,255,.2);box-shadow:0 28px 80px rgba(0,0,0,.36);background:#111;isolation:isolate}
    .hero-card img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;filter:saturate(1.04) contrast(1.08) brightness(.85);transition:.65s}
    .hero-card:hover img{transform:scale(1.08)}
    .hero-card:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(2,8,23,.82));z-index:1}
    .hero-card span{position:absolute;left:20px;right:20px;bottom:18px;z-index:2;font-weight:950;font-size:15px;color:white}
    .hero-card.large{grid-column:1/-1;min-height:270px}

    .trust-row{position:relative;z-index:3;margin-top:-45px}
    .trust-grid{display:grid;grid-template-columns:repeat(4,1fr);background:white;border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);overflow:hidden}
    .trust-item{padding:27px;border-right:1px solid var(--line)}
    .trust-item:last-child{border-right:0}
    .trust-item strong{display:block;font-size:18px;font-weight:950;color:#0f172a}
    .trust-item span{display:block;color:var(--slate);font-size:13px;margin-top:5px}

    section{padding:104px 0}
    .light{background:var(--paper)}
    .dark{background:linear-gradient(135deg,#020817,#07111f);color:white}
    .section-head{max-width:880px;margin-bottom:46px}
    .section-head.center{text-align:center;margin-inline:auto}
    h2{font-size:clamp(36px,5vw,68px);line-height:.98;letter-spacing:-2.8px;margin-bottom:18px}
    .section-head p{font-size:18px;color:var(--slate);line-height:1.78}
    .dark .section-head p{color:#bed0e6}

    .logo-section{background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
    .premium-logo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    .logo-card{position:relative;min-height:164px;background:#fff;border:1px solid #e5eaf2;border-radius:26px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;box-shadow:var(--softShadow);overflow:hidden;transition:.3s}
    .logo-card:before{content:"";position:absolute;inset:auto -30% -55% -30%;height:120px;background:radial-gradient(circle,rgba(215,168,77,.16),transparent 60%)}
    .logo-card:hover{transform:translateY(-7px);border-color:#dfc47c;box-shadow:0 30px 80px rgba(7,17,31,.14)}
    .logo-card img{max-width:205px;max-height:82px;object-fit:contain;position:relative;z-index:1}
    .logo-card span{position:relative;z-index:1;margin-top:14px;font-size:12px;font-weight:950;text-transform:uppercase;letter-spacing:1.4px;color:#64748b;text-align:center}
    .client-proof{background:linear-gradient(180deg,#07111f,#020617);color:white}
    .client-proof .section-head p{color:#cbd5e1}
    .client-card{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);box-shadow:0 25px 70px rgba(0,0,0,.25)}
    .client-card span{color:#dbeafe}

    .solution-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
    .service-card{position:relative;perspective:1200px;transform-style:preserve-3d;will-change:transform;background:white;border:1px solid var(--line);border-radius:30px;min-height:450px;display:flex;flex-direction:column;box-shadow:var(--softShadow);transition:.28s;overflow:hidden}
    .service-card:hover{transform:translateY(-10px) scale(1.018) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg));box-shadow:0 35px 100px rgba(7,17,31,.24)}
    .service-card::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.26),transparent 60%);opacity:0;transition:opacity .35s;pointer-events:none}
    .service-card:hover::after{opacity:1;animation:shine 1s forwards}
    @keyframes shine{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
    .service-art{height:195px;position:relative;overflow:hidden;background:#07111f}
    .service-art img{width:100%;height:100%;object-fit:cover;filter:saturate(1.05) contrast(1.08);transition:transform .65s ease}
    .service-card:hover .service-art img{transform:scale(1.08)}
    .service-art:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(2,8,23,.72),rgba(11,92,255,.35));z-index:1}
    .service-art:after{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.11) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.11) 1px,transparent 1px);background-size:34px 34px;z-index:2;opacity:.55}
    .service-body{padding:29px;display:flex;flex-direction:column;flex:1}
    .service-body small{font-weight:950;color:var(--royal);letter-spacing:1.5px;text-transform:uppercase}
    .service-body h3{font-size:27px;line-height:1.1;margin:12px 0}
    .service-body p{color:var(--slate);line-height:1.7;margin-bottom:22px}
    .link{margin-top:auto;color:var(--royal);font-weight:950}

    .feature-band{background:linear-gradient(135deg,#07111f,#0b1729);color:white;overflow:hidden}
    .feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:44px;align-items:center}
    .feature-copy p{color:#cbd5e1;line-height:1.82;font-size:17px}
    .mini-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:25px}
    .mini{border:1px solid var(--darkLine);background:rgba(255,255,255,.06);border-radius:20px;padding:18px}
    .mini strong{display:block;color:#f8d983;margin-bottom:5px}
    .feature-visual{height:470px;border:1px solid var(--darkLine);border-radius:34px;background:url('https://images.unsplash.com/photo-1558494949-ef010cbdcc31?auto=format&fit=crop&w=1500&q=88') center/cover;position:relative;overflow:hidden;box-shadow:0 30px 100px rgba(0,0,0,.28)}
    .feature-visual:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(2,8,23,.9),rgba(11,92,255,.32)),linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px);background-size:auto,38px 38px,38px 38px;animation:gridMove 12s linear infinite}
    @keyframes gridMove{to{background-position:0 0,76px 76px,76px 76px}}
    .feature-node{position:absolute;border-radius:999px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18);padding:14px 18px;color:white;font-weight:900;backdrop-filter:blur(12px);z-index:2}
    .node-1{left:42px;top:56px}.node-2{right:48px;top:135px}.node-3{left:70px;bottom:92px}.node-4{right:58px;bottom:62px}

    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
    .stat{background:white;border:1px solid var(--line);border-radius:30px;padding:36px;box-shadow:var(--softShadow)}
    .stat strong{font-size:72px;color:var(--royal);line-height:1;display:block;letter-spacing:-3px}
    .stat span{font-weight:950;font-size:18px}.stat p{color:var(--slate);margin-top:12px;line-height:1.68}

    .case-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
    .case{background:white;border:1px solid var(--line);border-radius:30px;box-shadow:var(--softShadow);transition:.28s;overflow:hidden}
    .case:hover{transform:translateY(-8px);box-shadow:var(--shadow)}
    .case-top{height:190px;position:relative;background:#07111f;overflow:hidden}
    .case-top img{width:100%;height:100%;object-fit:cover;transition:.6s}
    .case:hover .case-top img{transform:scale(1.07)}
    .case-top:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(2,8,23,.2),rgba(2,8,23,.82))}
    .case-body{padding:28px}.case-body small{color:var(--royal);font-weight:950;text-transform:uppercase;letter-spacing:1.4px}.case-body h3{font-size:26px;margin:12px 0}.case-body p{color:var(--slate);line-height:1.7}.case-body span{display:inline-block;color:var(--royal);font-weight:950;margin-top:18px}

    .process-list{display:grid;gap:18px}
    .process-item{display:grid;grid-template-columns:94px 1fr 150px;align-items:center;background:rgba(255,255,255,.06);border:1px solid var(--darkLine);border-radius:28px;padding:26px;transition:.25s}
    .process-item:hover{background:rgba(255,255,255,.09);transform:translateX(5px)}
    .process-item strong{font-size:42px;color:#f8d983;line-height:1}.process-item h3{font-size:27px}.process-item p{color:#bfd0e5;margin-top:5px}.process-item a{color:#f8d983;font-weight:950;text-align:right}

    .price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
    .price-card{background:white;border:1px solid var(--line);border-radius:30px;padding:36px;box-shadow:var(--softShadow);position:relative;transition:.25s}
    .price-card:hover{transform:translateY(-7px);box-shadow:var(--shadow)}
    .price-card.featured{border:2px solid var(--gold);transform:translateY(-12px);box-shadow:0 30px 90px rgba(215,168,77,.2)}
    .badge{display:inline-block;background:linear-gradient(135deg,#07111f,#d7a84d);color:white;padding:8px 13px;border-radius:999px;font-size:12px;font-weight:950;margin-bottom:16px}
    .price-card h3{font-size:30px}.price{font-size:50px;font-weight:950;margin:12px 0;letter-spacing:-2px}.price small{font-size:15px;color:var(--slate);font-weight:600}.price-card ul{list-style:none;display:grid;gap:12px;color:#526071;margin-top:18px}.price-card li:before{content:"✓ ";color:var(--green);font-weight:950}

    .cta{background:linear-gradient(135deg,#020817,#07111f);color:white}.cta-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:42px;align-items:start}.cta p{color:#c4d3e6;font-size:18px;line-height:1.8;margin-bottom:24px}.contact-card{border:1px solid var(--darkLine);border-radius:28px;padding:26px;background:rgba(255,255,255,.06);display:grid;gap:10px}.lead-form{background:white;color:var(--ink);border-radius:30px;padding:30px;display:grid;gap:14px;box-shadow:var(--shadow)}.lead-form input,.lead-form select,.lead-form textarea{width:100%;padding:15px 16px;border:1px solid var(--line);border-radius:16px;font:inherit}.lead-form textarea{min-height:120px;resize:vertical}.lead-form button{border:0}.small{font-size:13px;color:#64748b}.whatsapp{position:fixed;right:22px;bottom:22px;z-index:1000;background:#25D366;color:white;padding:15px 19px;border-radius:999px;font-weight:950;box-shadow:0 14px 35px rgba(0,0,0,.25)}

    .page-hero{position:relative;background:linear-gradient(90deg,rgba(2,8,23,.96),rgba(7,17,31,.82)),url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=2200&q=88') center/cover;color:white;padding:94px 0 76px;overflow:hidden}.page-hero:after{content:"";position:absolute;right:7%;bottom:-80px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(215,168,77,.28),transparent 65%)}.page-hero .container{position:relative;z-index:2}.breadcrumb{color:#f8d983;font-size:13px;font-weight:850;margin-bottom:24px}.page-hero h1{font-size:clamp(42px,6vw,82px);line-height:.96;letter-spacing:-3px;max-width:980px}.page-hero p{color:#d7e6ff;font-size:20px;line-height:1.75;max-width:820px;margin-top:24px}.page-nav{background:white;border-bottom:1px solid var(--line);position:sticky;top:82px;z-index:20}.page-nav .container{display:flex;gap:24px;overflow:auto}.page-nav a{padding:18px 0;font-weight:950;color:#526071;white-space:nowrap}.content-block{padding:82px 0;border-bottom:1px solid var(--line)}.content-grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:48px}.content-grid h2{font-size:clamp(34px,4vw,56px)}.content-grid p{color:var(--slate);line-height:1.85;font-size:17px}.detail-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}.detail-card{border:1px solid var(--line);border-radius:24px;padding:24px;background:#fff;box-shadow:0 14px 40px rgba(7,17,31,.05)}.detail-card strong{font-size:20px;display:block;margin-bottom:8px}.detail-card span{color:var(--slate);line-height:1.7}.quote{font-size:30px;line-height:1.25;letter-spacing:-1px;color:var(--ink);background:#fff8e8;border-left:5px solid var(--gold);padding:34px;margin-top:34px;border-radius:0 24px 24px 0}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:36px}.panel{background:white;border:1px solid var(--line);border-radius:30px;padding:42px;box-shadow:var(--softShadow)}.panel.dark-panel{background:var(--ink);color:white;border-color:var(--ink)}.panel h3{font-size:38px;line-height:1.08;letter-spacing:-1.3px;margin-bottom:18px}.panel p{color:var(--slate);line-height:1.8}.dark-panel p{color:#bfd0e5}.list{list-style:none;display:grid;gap:14px;margin-top:22px;color:#526071}.dark-panel .list{color:#d9e8f8}.list li{display:flex;gap:10px}.list li:before{content:"—";color:var(--gold);font-weight:950}.page-photo{min-height:380px;border-radius:34px;overflow:hidden;box-shadow:var(--shadow);position:relative}.page-photo img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}.page-photo:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(2,8,23,.5))}

    footer{background:#f8fafc;border-top:1px solid var(--line);padding:46px 0;color:#526071}.footer-grid{display:grid;grid-template-columns:1.3fr repeat(3,1fr);gap:24px}.footer-grid h4{color:var(--ink);margin-bottom:12px}.footer-grid a,.footer-grid span{display:block;color:#526071;margin-bottom:9px;font-size:14px}.fade{animation:fade .35s ease}@keyframes fade{from{opacity:.25;transform:translateY(10px)}to{opacity:1;transform:none}}

    @media(max-width:1050px){
      .navlinks{display:none}.menu-btn{display:block}.hero .container,.feature-grid,.cta-grid,.content-grid,.two-col{grid-template-columns:1fr}.hero{padding:90px 0;min-height:auto}.hero-board{max-width:720px}.premium-logo-grid,.solution-grid,.stats,.case-grid,.price-grid,.trust-grid,.footer-grid,.detail-cards{grid-template-columns:1fr 1fr}.page-nav{top:82px}
    }
    @media(max-width:680px){
      .topbar{display:none}.nav{height:76px}.brand-title{font-size:14px}.brand-sub{font-size:9px;letter-spacing:1.5px}.brand-mark{width:46px;height:46px}.brand-mark img{height:42px}.hero h1{letter-spacing:-2.7px}.hero p{font-size:17px}.hero-board,.premium-logo-grid,.solution-grid,.stats,.case-grid,.price-grid,.trust-grid,.footer-grid,.detail-cards{grid-template-columns:1fr}.trust-row{margin-top:0}.trust-grid{border-radius:0;border-left:0;border-right:0}.trust-item{border-right:0;border-bottom:1px solid var(--line)}section{padding:76px 0}.process-item{grid-template-columns:1fr;gap:10px}.process-item a{text-align:left}.price-card.featured{transform:none}.page-nav{top:76px}.whatsapp{left:18px;right:18px;text-align:center}.mobile-panel{inset:88px 14px auto 14px}.hero-board{display:none}
    }
  

    /* ===== TRUE 10/10 WOW MOTION SYSTEM ===== */
    .hero h1,
    .page-hero h1{
      background:linear-gradient(90deg,#ffffff,#dbeafe,#f8d983,#39c8ff,#ffffff);
      background-size:320% auto;
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation:premiumTextFlow 7s linear infinite;
    }

    @keyframes premiumTextFlow{
      to{background-position:320% center}
    }

    .hero{
      isolation:isolate;
    }

    .hero .container:before{
      content:"";
      position:absolute;
      width:560px;
      height:560px;
      right:4%;
      top:8%;
      border-radius:50%;
      background:radial-gradient(circle,rgba(11,92,255,.32),transparent 62%);
      filter:blur(20px);
      z-index:-1;
      animation:orbFloat 7s ease-in-out infinite;
    }

    .hero .container:after{
      content:"";
      position:absolute;
      width:420px;
      height:420px;
      left:-10%;
      bottom:0;
      border-radius:50%;
      background:radial-gradient(circle,rgba(215,168,77,.22),transparent 65%);
      filter:blur(18px);
      z-index:-1;
      animation:orbFloat 8s ease-in-out infinite reverse;
    }

    @keyframes orbFloat{
      0%,100%{transform:translate3d(0,0,0) scale(1)}
      50%{transform:translate3d(0,-34px,0) scale(1.06)}
    }

    .btn{
      position:relative;
      overflow:hidden;
    }

    .btn:before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg,transparent,rgba(255,255,255,.48),transparent);
      transform:translateX(-125%);
      pointer-events:none;
    }

    .btn:hover:before{
      animation:buttonFlash .75s forwards;
    }

    @keyframes buttonFlash{
      to{transform:translateX(125%)}
    }

    .hero-card,
    .logo-card,
    .case,
    .price-card,
    .stat,
    .detail-card,
    .panel{
      transform-style:preserve-3d;
    }

    .hero-card:hover,
    .logo-card:hover,
    .case:hover,
    .stat:hover,
    .detail-card:hover,
    .panel:hover{
      transform:translateY(-10px) scale(1.02);
    }

    .stat,
    .detail-card,
    .panel{
      transition:.3s ease;
    }

    .stat:before,
    .detail-card:before,
    .panel:before{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      right:-70px;
      top:-70px;
      border-radius:50%;
      background:radial-gradient(circle,rgba(11,92,255,.16),transparent 70%);
      pointer-events:none;
    }

    .stat,
    .detail-card,
    .panel{
      position:relative;
      overflow:hidden;
    }

    .feature-node{
      animation:floatingNode 4.2s ease-in-out infinite;
    }

    .node-2{animation-delay:.45s}
    .node-3{animation-delay:.9s}
    .node-4{animation-delay:1.35s}

    @keyframes floatingNode{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-16px)}
    }

    .logo-card img{
      transition:.35s ease;
    }

    .logo-card:hover img{
      transform:scale(1.09);
    }

    .service-card:hover .service-body h3,
    .case:hover h3,
    .price-card:hover h3{
      color:var(--royal);
    }

    .process-item{
      position:relative;
      overflow:hidden;
    }

    .process-item:before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg,rgba(11,92,255,.22),transparent 68%);
      opacity:0;
      transition:.3s;
      pointer-events:none;
    }

    .process-item:hover:before{
      opacity:1;
    }

    .wow-reveal{
      opacity:0;
      transform:translateY(38px) scale(.985);
      transition:opacity .85s ease, transform .85s cubic-bezier(.2,.7,.2,1);
    }

    .wow-reveal.show-wow{
      opacity:1;
      transform:translateY(0) scale(1);
    }

    .premium-glow-border{
      position:relative;
    }

    .premium-glow-border:after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      padding:1px;
      background:linear-gradient(135deg,rgba(57,200,255,.55),rgba(215,168,77,.55),rgba(11,92,255,.35));
      -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      opacity:0;
      transition:.35s;
      pointer-events:none;
    }

    .premium-glow-border:hover:after{
      opacity:1;
    }

    @media (prefers-reduced-motion: reduce){
      *,*:before,*:after{animation:none!important;transition:none!important;scroll-behavior:auto!important}
      .wow-reveal{opacity:1;transform:none}
    }
  </style>
</head>

    const pages={
      'it-solutions':{k:'Service page',title:'Managed IT Solutions',intro:'Reliable daily technology support for businesses that need systems to run smoothly, employees to stay productive, and issues handled quickly.',why:'Modern companies depend on computers, accounts, cloud tools, printers, files, backups, and security. Without a clear IT support model, small issues become daily friction. SGI creates a cleaner support structure so your team knows who to call, what is being managed, and how problems are handled.',cards:[['Helpdesk and user support','Remote and onsite support options for user issues, device problems, accounts, email, printers, and day-to-day IT needs.'],['Microsoft 365 management','Email, users, groups, permissions, OneDrive, SharePoint, Teams, and secure cloud collaboration.'],['Device and endpoint management','Workstation setup, updates, security tools, onboarding, offboarding, and device lifecycle support.'],['Backup and continuity','Practical backup and recovery planning so important files and systems are not left exposed.']],quote:'The goal is not only to fix IT problems. The goal is to make technology feel stable, supported, and predictable.'},
      'network-infrastructure':{k:'Service page',title:'Network Infrastructure',intro:'Professional network design, cabling, Wi-Fi, switching, routing, firewalls, and connectivity planning for offices, warehouses, retail, and multi-site businesses.',why:'Your network is the foundation of every system: POS, cameras, phones, cloud tools, staff devices, access control, and security. If the network is weak, everything feels weak. SGI designs network environments with coverage, speed, segmentation, security, and future growth in mind.',cards:[['Structured cabling','Clean cabling, rack organization, labeling, patching, and professional installation for long-term serviceability.'],['Wi-Fi design','Access point placement, coverage planning, roaming, guest networks, and performance tuning.'],['Switching and routing','Business-grade switching, VLAN planning, routing, firewall integration, and site requirements.'],['Multi-location connectivity','Planning for businesses with multiple sites, remote users, centralized management, and secure access.']],quote:'A strong network is invisible. People only notice the network when it fails. Our work is to make sure they do not notice it.'},
      'security-systems':{k:'Service page',title:'Security & Surveillance Systems',intro:'CCTV, access control, intercoms, alarms, monitoring, and physical security planning for businesses that need visibility and control.',why:'Security is more than installing cameras. It is about coverage, access, monitoring, user permissions, incident visibility, and making sure the system is actually usable when something happens. SGI designs physical security systems around real business needs.',cards:[['CCTV surveillance','Camera placement, NVR setup, remote viewing, recording configuration, and coverage planning.'],['Access control','Door access, restricted areas, user permissions, and site control for staff and visitors.'],['Monitoring and visibility','Remote access, alerts, system health, and easier management of security events.'],['Integrated planning','Network, power, cabling, storage, and access are planned together so security systems remain reliable.']],quote:'The value of a security system is not the equipment. The value is what you can see, control, and prove when it matters.'},
      'cybersecurity':{k:'Service page',title:'Cybersecurity & Risk Reduction',intro:'Security-first IT planning to reduce exposure, protect users, strengthen access, and improve resilience.',why:'Many businesses have security gaps without realizing it: weak passwords, unmanaged devices, no backups, exposed remote access, or unclear permissions. SGI helps improve security step by step without overwhelming the business.',cards:[['Endpoint protection','Protection for workstations and devices to reduce malware and unauthorized activity risks.'],['Firewall and access control','Network security, secure access rules, segmentation, and safer connectivity.'],['Backup and recovery','Backup planning to reduce the impact of accidental deletion, hardware failure, or security incidents.'],['Security assessment','Review of current risks, quick wins, and a practical improvement plan.']],quote:'Cybersecurity does not need to be confusing. It needs to be structured, practical, and maintained.'},
      'cloud-continuity':{k:'Service page',title:'Cloud & Business Continuity',intro:'Cloud migration, Microsoft 365, secure remote work, backups, disaster recovery, and continuity planning.',why:'Cloud systems help businesses work from anywhere, collaborate better, and reduce dependency on fragile local setups. The key is doing it securely with the right permissions, backups, and user training.',cards:[['Microsoft 365 setup','Email, Teams, SharePoint, OneDrive, user accounts, and permissions.'],['Cloud migration','Moving files, email, and workflows into safer and more scalable cloud environments.'],['Secure remote work','Access planning for remote users without exposing the business to unnecessary risk.'],['Disaster recovery','Planning for recovery so downtime and data loss do not become business-ending events.']],quote:'Cloud is not just storage. Done properly, it becomes a continuity system for your business.'},
      'managed-support':{k:'Service page',title:'Managed Support',intro:'Ongoing support, monitoring, documentation, maintenance, and improvement after installation.',why:'One-time installation is not enough. Systems need updates, support, user changes, monitoring, documentation, and improvement. Managed support gives businesses a clear path instead of guessing who owns the issue.',cards:[['Support workflow','A clear path for employees and managers when technology issues appear.'],['Monitoring and maintenance','System health checks, updates, backups, and recurring review.'],['Documentation','Cleaner records of systems, access, devices, networks, and configurations.'],['Continuous improvement','Technology evolves with the business instead of becoming outdated again.']],quote:'The real difference between a vendor and a partner appears after the installation is finished.'},
      'industries':{k:'Industry page',title:'Industries We Support',intro:'Technology and security solutions for offices, warehouses, retail, clinics, real estate, construction, logistics, and small businesses across Canada.',why:'Different industries need different outcomes. A warehouse needs coverage and connectivity. An office needs productivity and support. Retail needs POS stability and surveillance. SGI adapts the technology plan to the environment.',cards:[['Offices','Managed IT, Microsoft 365, Wi-Fi, endpoint protection, access control, and camera systems.'],['Warehouses','CCTV coverage, access control, long-range Wi-Fi, paging, and operational visibility.'],['Retail','POS stability, cameras, remote viewing, guest Wi-Fi, and multi-location support.'],['Clinics and professional services','Secure access, backup, privacy-conscious IT support, Wi-Fi, and reliable daily systems.']],quote:'The right solution depends on the environment, not just the technology.'},
      'about':{k:'Company page',title:'About Smart Guard Innovations',intro:'A Canadian IT, network and security solutions company built for businesses that need reliability, accountability and long-term technology ownership.',why:'SGI combines practical field experience, engineering-minded problem solving and enterprise-style IT thinking. With around 10 years of combined experience across electronics, communication engineering, IT support, networking and security systems, the team is positioned to support businesses that want one trusted partner instead of many disconnected vendors.',cards:[['Engineering background','Founders with electronics and communication engineering background and hands-on technology experience.'],['IT and enterprise exposure','Experience connected to IT support, infrastructure, enterprise environments and business technology operations.'],['Security and field delivery','Practical deployment experience across cameras, networking, cabling, access control and site-based technology.'],['Canada-wide mindset','Built to serve businesses across Canada with scalable solutions and clear communication.']],quote:'SGI is not positioned as only an installer. SGI is positioned as a long-term technology partner.'},
      'partners':{k:'Authority page',title:'Authorized Technology Partners',intro:'SGI works with authorized technology partner ecosystems across networking, cybersecurity, surveillance, access control, automation and infrastructure.',why:'This section represents SGI’s technology capability layer — the platforms and systems we can deploy, configure, support and integrate for business environments.',cards:[['Networking and cybersecurity','Cisco, Fortinet and Ubiquiti platforms for reliable network, security and connectivity environments.'],['Surveillance and access','Hikvision, Dahua, Lorex and Honeywell systems for CCTV, access control and physical security.'],['Infrastructure and automation','Leviton, Crestron and related infrastructure platforms for structured environments and smarter spaces.'],['Client-first selection','Technology is selected based on project requirements, performance, security, budget and long-term supportability.']],quote:'Authorized partners show capability. Trusted industry logos show proof. SGI separates both clearly.'},
      'solutions':{k:'Solutions page',title:'Solutions by Business Problem',intro:'Explore SGI solutions based on the problem your business needs to solve: downtime, security, network performance, visibility, growth or support.',why:'Business owners do not wake up wanting cabling, cameras or Microsoft 365 settings. They want fewer interruptions, better protection, easier operations and confidence that someone owns the system.',cards:[['Reduce downtime','Monitoring, better network design, managed support, backups and faster response workflows.'],['Secure your business','CCTV, access control, cybersecurity, endpoint protection, firewalls and secure access planning.'],['Upgrade your network','Structured cabling, Wi-Fi redesign, switching, routing, VLANs and multi-site connectivity.'],['Improve visibility','Camera coverage, remote viewing, monitoring, reporting and site-level operational awareness.']],quote:'The best website speaks in business problems first, then connects those problems to technology solutions.'},
      'resources':{k:'Resources page',title:'Insights & Guides',intro:'Practical guides for business owners who want to understand IT, network and security decisions before investing.',why:'Resources help position SGI as an advisor, not just a vendor. These topics educate clients and create trust before the sales conversation.',cards:[['How to know your network is holding you back','Slow Wi-Fi, unstable systems, poor coverage and recurring outages are signs your infrastructure needs attention.'],['Why CCTV and IT should be planned together','Modern cameras depend on network quality, storage, cybersecurity and remote access planning.'],['What a free IT assessment should include','A useful assessment reviews risk, uptime, support gaps, backups, network health and security posture.'],['Why managed support beats reactive repair','Proactive support reduces surprises, improves accountability and helps prevent repeated problems.']],quote:'Education builds trust. Trust creates better sales conversations.'},
      'case-retail':{k:'Confidential case study',title:'Retail Business — GTA',intro:'Improving surveillance reliability, remote visibility, and operational network stability for a retail environment.',why:'The business needed better camera uptime, remote viewing, and improved network performance. The issue was not only security — unstable technology was affecting daily operations and visibility.',cards:[['Problem','Camera outages, weak remote access, network instability, and limited visibility across operations.'],['Solution','Centralized CCTV approach, secure remote viewing, network cleanup, and improved monitoring structure.'],['Result','Improved camera uptime, better operational visibility, and stronger control across locations.'],['Client privacy','Details remain confidential for privacy and security reasons.']],quote:'This type of project shows why IT and physical security should be planned together.'},
      'case-office':{k:'Confidential case study',title:'Corporate Office — Mississauga',intro:'Creating a cleaner IT environment with Microsoft 365, endpoint protection, workstation setup, and support structure.',why:'The office needed better user account management, device setup, security, and support. The goal was to reduce recurring IT friction and create a more professional operating environment.',cards:[['Problem','Unmanaged workstations, inconsistent support, weak endpoint protection, and account confusion.'],['Solution','Microsoft 365 setup, device standardization, endpoint protection, backups, and support workflow.'],['Result','Faster onboarding, better productivity, stronger control, and fewer daily IT interruptions.'],['Client privacy','Details remain confidential for privacy and security reasons.']],quote:'Good office IT is quiet. It works in the background so the team can focus.'},
      'case-warehouse':{k:'Confidential case study',title:'Warehouse — Brampton',intro:'Improving security coverage, access control, Wi-Fi reach, and operational visibility in a warehouse environment.',why:'Large spaces create coverage challenges. The business needed better camera placement, restricted access control, and more reliable connectivity throughout the site.',cards:[['Problem','Camera blind spots, weak Wi-Fi zones, restricted areas without access control, and limited visibility.'],['Solution','CCTV layout, access control, improved Wi-Fi coverage, and monitoring visibility.'],['Result','Better coverage, stronger access control, improved staff coordination, and reduced security gaps.'],['Client privacy','Details remain confidential for privacy and security reasons.']],quote:'Warehouse security is about visibility, control, and reliable connectivity across the full space.'}

</div></div></section><section class="trust-row"><div class="container"><div class="trust-grid"><div class="trust-item"><strong>IT Solutions</strong><span>Managed support and operations</span></div><div class="trust-item"><strong>Networking</strong><span>Cabling, Wi-Fi and infrastructure</span></div><div class="trust-item"><strong>Security</strong><span>Cybersecurity, CCTV and access</span></div><div class="trust-item"><strong>Canada-wide</strong><span>Built for growing businesses</span></div></div></div></section>${logoSections()}<section id="services"><div class="container"><div class="section-head"><div class="kicker">Solutions</div><h2>One partner for your complete technology environment.</h2><p>Each service opens into a full explanation page — business value, technical scope, delivery model and outcomes.</p></div>${serviceGrid()}</div></section><section class="feature-band"><div class="container feature-grid"><div class="feature-copy"><div class="kicker">The SGI Difference</div><h2>Not just installation. Long-term technology ownership.</h2><p>SGI positions your IT, network, cyber and physical security as one operating environment. That means better planning, fewer gaps, faster support and clearer accountability.</p><div class="mini-grid"><div class="mini"><strong>Strategy</strong><span>Business-first assessment</span></div><div class="mini"><strong>Architecture</strong><span>Systems designed together</span></div><div class="mini"><strong>Delivery</strong><span>Professional implementation</span></div><div class="mini"><strong>Support</strong><span>Ongoing ownership</span></div></div></div><div class="feature-visual"><div class="feature-node node-1">Cloud</div><div class="feature-node node-2">Network</div><div class="feature-node node-3">Cyber</div><div class="feature-node node-4">CCTV</div></div></div></section><section class="light"><div class="container"><div class="section-head"><div class="kicker">Business Impact</div><h2>Technology should drive growth — not on><section class="light"><div class="container"><div class="section-head"><div class="kicker">Pricing</div><h2>Clear plans. Custom scope when needed.</h2><p>Monthly support and project-based investments give clients a simple path to start.</p></div>${pricingCards()}</div></section>${contactSection()}</main>${footer()}`}

    function servicePage(key){let p=pages[key];if(!p)return home();return `${header()}<main class="fade"><section class="page-hero"><div class="container"><div class="breadcrumb"><a href="#/">Home</a> / ${p.k}</div><h1>${p.title}</h1><p>${p.intro}</p><a class="btn" href="#/contact" style="margin-top:26px">Book Assessment</a></div></section><div class="page-nav"><div class="container"><a href="#overview">Overview</a><a href="#capabilities">Capabilities</a><a href="#delivery">Delivery</a><a href="#contact-block">Start</a></div></div><section id="overview" class="content-block"><div class="container content-grid"><div><div class="kicker">Overview</div><h2>Why this matters.</h2><div class="page-photo"><img src="${photoMap[key] || photoMap['solutions']}" alt="${p.title}"></div></div><div><p>${p.why}</p><div class="quote">${p.quote}</div></div></div></section><section id="capabilities" class="content-block"><div class="container content-grid"><div><div class="kicker">Capabilities</div><h2>What SGI delivers.</h2></div><div class="detail-cards">${p.cards.map(c=>`<div class="detail-card"><strong>${c[0]}</strong><span>${c[1]}</span></div>`).join('')}</div></div></section><section id="delivery" class="content-block light"><div class="container two-col"><div class="panel"><h3>How we approach delivery</h3><p>SGI starts with assessment, then builds a practical scope with timeline, priorities and support requirements. The objective is to reduce surprises and deliver a solution that works in real business conditions.</p><ul class="list"><li>Discovery and assessment</li><li>Clear scope and recommendation</li><li>Professional implementation</li><li>Testing, documentation and support</li></ul></div><div class="panel dark-panel"><h3>Expected business outcome</h3><p>Better reliability, stronger security, clearer accountability and an environment that is easier to support as your business grows.</p><a href="#/contact" class="btn" style="margin-top:24px">Discuss this service</a></div></div></section><div id="contact-block">${contactSection()}</div></main>${footer()}`}

    function listPage(type){
      if(type==='services')return `${header()}<main class="fade"><section class="page-hero"><div class="container"><div class="breadcrumb"><a href="#/">Home</a> / Services</div><h1>Enterprise IT, Network & Security Services</h1><p>Open any service below for a complete explanation page.</p></div></section><section><div class="container">${serviceGrid()}</div></section></main>${footer()}`;
      if(type==='industries')return servicePage('industries');
      if(type==='about')return servicePage('about');
      if(type==='partners')return `${header()}<main class="fade"><section class="page-hero"><div class="container"><div class="breadcrumb"><a href="#/">Home</a> / Partners</div><h1>Authorized Technology Partners</h1><p>SGI separates partner platforms from client/industry proof for a cleaner authority story.</p></div></section>${logoSections()}${servicePage('partners').match(/<section id="overview"[\s\S]*?<\/main>/)?.[0]?.replace('</main>','') || ''}</main>${footer()}`;
      if(type==='solutions')return servicePage('solutions');
      if(type==='resources')return servicePage('resources');
      if(type==='case-studies')return `${header()}<main class="fade"><section class="page-hero"><div class="container"><div class="breadcrumb"><a href="#/">Home</a> / Case Studies</div><h1>Confidential Case Studies</h1><p>Real-style project stories presented without fake client names.</p></div></section><section class="light"><div class="container">${caseGrid()}</div></section></main>${footer()}`;
      if(type==='pricing')return `${header()}<main class="fade"><section class="page-hero"><div class="container"><div class="breadcrumb"><a href="#/">Home</a> / Pricing</div><h1>Pricing and Engagement Options</h1><p>Clear starting points for monthly support and custom project work.</p></div></section><section class="light"><div class="container">${pricingCards()}</div></section>${contactSection()}</main>${footer()}`;
      if(type==='contact')return `${header()}<main class="fade"><section class="page-hero"><div class="container"><div class="breadcrumb"><a href="#/">Home</a> / Contact</div><h1>Book your free IT assessment.</h1><p>Tell us what you need help with. We’ll review your situation and recommend the best next step.</p></div></section>${contactSection()}</main>${footer()}`;
      return home();
    }

    function toggleMenu(force){
      const panel=document.getElementById('mobilePanel');
      if(!panel)return;
      const open = typeof force === 'boolean' ? force : panel.style.display !== 'block';
      panel.style.display = open ? 'block' : 'none';
    }

    function render(){
      let route=location.hash.replace('#/','')||'';
      let app=document.getElementById('app');
      if(route.startsWith('service/')) app.innerHTML=servicePage(route.split('/')[1]);
      else if(pages[route]) app.innerHTML=servicePage(route);
      else if(['services','about','solutions','partners','resources','industries','case-studies','pricing','contact'].includes(route)) app.innerHTML=listPage(route);
      else app.innerHTML=home();
      window.scrollTo(0,0);
      setTimeout(()=>{
        activatePremiumTilt();
        activateWowReveal();
      },50);
    }

    function activatePremiumTilt(){
      document.querySelectorAll('.service-card').forEach(card=>{
        card.addEventListener('mousemove',e=>{
          const rect=card.getBoundingClientRect();
          const x=e.clientX-rect.left;
          const y=e.clientY-rect.top;
          const midX=rect.width/2;
          const midY=rect.height/2;
          const rotateY=((x-midX)/midX)*7;
          const rotateX=-((y-midY)/midY)*7;
          card.style.setProperty('--rx',rotateX+'deg');
          card.style.setProperty('--ry',rotateY+'deg');
        });
        card.addEventListener('mouseleave',()=>{
          card.style.setProperty('--rx','0deg');
          card.style.setProperty('--ry','0deg');
        });
      });
    }

    let revealObserver;
    function activateWowReveal(){
      if(revealObserver) revealObserver.disconnect();
      revealObserver = new IntersectionObserver(entries=>{
        entries.forEach(entry=>{
          if(entry.isIntersecting){
            entry.target.classList.add('show-wow');
          }
        });
      },{threshold:.14});

      document.querySelectorAll('section,.service-card,.case,.price-card,.logo-card,.stat,.detail-card,.panel,.process-item')
        .forEach((el,index)=>{
          el.classList.add('wow-reveal');
          el.style.transitionDelay = Math.min(index * 35, 260) + 'ms';
          revealObserver.observe(el);
        });

      document.querySelectorAll('.service-card,.case,.price-card,.logo-card,.stat,.detail-card,.panel')
        .forEach(el=>el.classList.add('premium-glow-border'));
    }

    window.addEventListener('hashchange',render);
    render();
  </script>
