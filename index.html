:root{--ink:#06111f;--ink2:#0b1b33;--blue:#0057ff;--cyan:#00b8ff;--white:#fff;--paper:#f6f8fb;--muted:#607086;--line:#dfe6ef;--darkline:rgba(255,255,255,.14);--green:#00c781;--red:#e23b4a;--shadow:0 28px 80px rgba(6,17,31,.14)}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{font-family:Inter,Arial,sans-serif;color:var(--ink);background:#fff;line-height:1.55}a{text-decoration:none;color:inherit}button,input,select,textarea{font-family:inherit}.container{width:min(1240px,92%);margin:auto}.hidden{display:none!important}

.feature-band{background:linear-gradient(135deg,#06111f,#0b1b33);color:white;overflow:hidden}.feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center}.feature-visual{height:460px;border:1px solid var(--darkline);background:radial-gradient(circle at 40% 35%,rgba(0,184,255,.55),transparent 17%),radial-gradient(circle at 70% 60%,rgba(0,87,255,.55),transparent 20%),#020617;position:relative;overflow:hidden}.feature-visual:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px);background-size:38px 38px;animation:grid 12s linear infinite}@keyframes grid{to{background-position:76px 76px}}.feature-copy p{color:#c4d3e6;line-height:1.8}.feature-copy h2{color:white}.mini-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:24px}.mini{border:1px solid var(--darkline);padding:18px;background:rgba(255,255,255,.06)}.mini strong{display:block;color:#7ddcff;margin-bottom:6px}

.cta{background:var(--ink);color:white}.cta-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:42px}.cta p{color:#c4d3e6;font-size:18px;line-height:1.8;margin-bottom:24px}.contact-card{border:1px solid var(--darkline);padding:26px;background:rgba(255,255,255,.06);display:grid;gap:10px}.lead-form{background:white;color:var(--ink);padding:30px;display:grid;gap:14px;box-shadow:var(--shadow)}.lead-form input,.lead-form select,.lead-form textarea{width:100%;padding:15px;border:1px solid var(--line);font:inherit}.lead-form textarea{min-height:120px}.lead-form button{border:0}.small{font-size:13px;color:#64748b}.whatsapp{position:fixed;right:22px;bottom:22px;z-index:1000;background:#25D366;color:white;padding:15px 19px;border-radius:999px;font-weight:900;box-shadow:0 14px 35px rgba(0,0,0,.25)}
.page-hero{background:linear-gradient(90deg,#06111f,#0b1b33);color:white;padding:88px 0 70px}.breadcrumb{color:#a9eaff;font-size:13px;font-weight:800;margin-bottom:24px}.page-hero h1{font-size:clamp(42px,6vw,82px);line-height:.96;letter-spacing:-3px;max-width:980px}.page-hero p{color:#d7e6ff;font-size:20px;line-height:1.75;max-width:820px;margin-top:24px}.page-nav{background:white;border-bottom:1px solid var(--line);position:sticky;top:112px;z-index:20}.page-nav .container{display:flex;gap:24px;overflow:auto}.page-nav a{padding:18px 0;font-weight:900;color:#526071;white-space:nowrap}.content-block{padding:80px 0;border-bottom:1px solid var(--line)}.content-grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:48px}.content-grid h2{font-size:clamp(34px,4vw,56px)}.content-grid p{color:var(--muted);line-height:1.85;font-size:17px}.detail-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}.detail-card{border:1px solid var(--line);padding:24px;background:#fff}.detail-card strong{font-size:20px;display:block;margin-bottom:8px}.detail-card span{color:var(--muted);line-height:1.7}.quote{font-size:32px;line-height:1.25;letter-spacing:-1px;color:var(--ink);background:#f8fbff;border-left:5px solid var(--blue);padding:34px;margin-top:34px}.back-link{display:inline-flex;margin-top:30px;color:var(--blue);font-weight:900}
footer{background:#f8fafc;border-top:1px solid var(--line);padding:44px 0;color:#526071}.footer-grid{display:grid;grid-template-columns:1.3fr repeat(3,1fr);gap:24px}.footer-grid h4{color:var(--ink);margin-bottom:12px}.footer-grid a,.footer-grid span{display:block;color:#526071;margin-bottom:9px;font-size:14px}.fade{animation:fade .35s ease}@keyframes fade{from{opacity:.2;transform:translateY(10px)}to{opacity:1;transform:none}}
@media(max-width:950px){.topbar,.navlinks{display:none}.menu-btn{display:block}.trust-row,.solution-grid,.two-col,.stats,.feature-grid,.case-grid,.price-grid,.cta-grid,.footer-grid,.content-grid,.detail-cards{grid-template-columns:1fr}.hero{min-height:auto;padding:90px 0}.process-item{grid-template-columns:1fr}.process-item a{text-align:left}.price-card.featured{transform:none}.page-nav{top:79px}.whatsapp{left:18px;right:18px;text-align:center}}

<script>
const assets={logos:['REMAX(2).png','Royal LePage(2).png','Comfort Of Living(2).png','firstlight Home Care(2).png','Planet bean Coffee(2).webp','Hikvision-logo(1).png','fortinet(1).png','ub(1).png','Leviton(1).png','lorex(1).png']};
const pages={
'it-solutions':{k:'Service page',title:'Managed IT Solutions',intro:'Reliable daily technology support for businesses that need systems to run smoothly, employees to stay productive, and issues handled quickly.',why:'Modern companies depend on computers, accounts, cloud tools, printers, files, backups, and security. Without a clear IT support model, small issues become daily friction. SGI creates a cleaner support structure so your team knows who to call, what is being managed, and how problems are handled.',cards:[['Helpdesk and user support','Remote and onsite support options for user issues, device problems, accounts, email, printers, and day-to-day IT needs.'],['Microsoft 365 management','Email, users, groups, permissions, OneDrive, SharePoint, Teams, and secure cloud collaboration.'],['Device and endpoint management','Workstation setup, updates, security tools, onboarding, offboarding, and device lifecycle support.'],['Backup and continuity','Practical backup and recovery planning so important files and systems are not left exposed.']],quote:'The goal is not only to fix IT problems. The goal is to make technology feel stable, supported, and predictable.'},
'network-infrastructure':{k:'Service page',title:'Network Infrastructure',intro:'Professional network design, cabling, Wi-Fi, switching, routing, firewalls, and connectivity planning for offices, warehouses, retail, and multi-site businesses.',why:'Your network is the foundation of every system: POS, cameras, phones, cloud tools, staff devices, access control, and security. If the network is weak, everything feels weak. SGI designs network environments with coverage, speed, segmentation, security, and future growth in mind.',cards:[['Structured cabling','Clean cabling, rack organization, labeling, patching, and professional installation for long-term serviceability.'],['Wi-Fi design','Access point placement, coverage planning, roaming, guest networks, and performance tuning.'],['Switching and routing','Business-grade switching, VLAN planning, routing, firewall integration, and site requirements.'],['Multi-location connectivity','Planning for businesses with multiple sites, remote users, centralized management, and secure access.']],quote:'A strong network is invisible. People only notice the network when it fails. Our work is to make sure they do not notice it.'},
'security-systems':{k:'Service page',title:'Security & Surveillance Systems',intro:'CCTV, access control, intercoms, alarms, monitoring, and physical security planning for businesses that need visibility and control.',why:'Security is more than installing cameras. It is about coverage, access, monitoring, user permissions, incident visibility, and making sure the system is actually usable when something happens. SGI designs physical security systems around real business needs.',cards:[['CCTV surveillance','Camera placement, NVR setup, remote viewing, recording configuration, and coverage planning.'],['Access control','Door access, restricted areas, user permissions, and site control for staff and visitors.'],['Monitoring and visibility','Remote access, alerts, system health, and easier management of security events.'],['Integrated planning','Network, power, cabling, storage, and access are planned together so security systems remain reliable.']],quote:'The value of a security system is not the equipment. The value is what you can see, control, and prove when it matters.'},
'cybersecurity':{k:'Service page',title:'Cybersecurity & Risk Reduction',intro:'Security-first IT planning to reduce exposure, protect users, strengthen access, and improve resilience.',why:'Many businesses have security gaps without realizing it: weak passwords, unmanaged devices, no backups, exposed remote access, or unclear permissions. SGI helps improve security step by step without overwhelming the business.',cards:[['Endpoint protection','Protection for workstations and devices to reduce malware and unauthorized activity risks.'],['Firewall and access control','Network security, secure access rules, segmentation, and safer connectivity.'],['Backup and recovery','Backup planning to reduce the impact of accidental deletion, hardware failure, or security incidents.'],['Security assessment','Review of current risks, quick wins, and a practical improvement plan.']],quote:'Cybersecurity does not need to be confusing. It needs to be structured, practical, and maintained.'},
'cloud-continuity':{k:'Service page',title:'Cloud & Business Continuity',intro:'Cloud migration, Microsoft 365, secure remote work, backups, disaster recovery, and continuity planning.',why:'Cloud systems help businesses work from anywhere, collaborate better, and reduce dependency on fragile local setups. The key is doing it securely with the right permissions, backups, and user training.',cards:[['Microsoft 365 setup','Email, Teams, SharePoint, OneDrive, user accounts, and permissions.'],['Cloud migration','Moving files, email, and workflows into safer and more scalable cloud environments.'],['Secure remote work','Access planning for remote users without exposing the business to unnecessary risk.'],['Disaster recovery','Planning for recovery so downtime and data loss do not become business-ending events.']],quote:'Cloud is not just storage. Done properly, it becomes a continuity system for your business.'},
'managed-support':{k:'Service page',title:'Managed Support',intro:'Ongoing support, monitoring, documentation, maintenance, and improvement after installation.',why:'One-time installation is not enough. Systems need updates, support, user changes, monitoring, documentation, and improvement. Managed support gives businesses a clear path instead of guessing who owns the issue.',cards:[['Support workflow','A clear path for employees and managers when technology issues appear.'],['Monitoring and maintenance','System health checks, updates, backups, and recurring review.'],['Documentation','Cleaner records of systems, access, devices, networks, and configurations.'],['Continuous improvement','Technology evolves with the business instead of becoming outdated again.']],quote:'The real difference between a vendor and a partner appears after the installation is finished.'},
'industries':{k:'Industry page',title:'Industries We Support',intro:'Technology and security solutions for offices, warehouses, retail, clinics, real estate, construction, logistics, and small businesses across Canada.',why:'Different industries need different outcomes. A warehouse needs coverage and connectivity. An office needs productivity and support. Retail needs POS stability and surveillance. SGI adapts the technology plan to the environment.',cards:[['Offices','Managed IT, Microsoft 365, Wi-Fi, endpoint protection, access control, and camera systems.'],['Warehouses','CCTV coverage, access control, long-range Wi-Fi, paging, and operational visibility.'],['Retail','POS stability, cameras, remote viewing, guest Wi-Fi, and multi-location support.'],['Clinics and professional services','Secure access, backup, privacy-conscious IT support, Wi-Fi, and reliable daily systems.']],quote:'The right solution depends on the environment, not just the technology.'},
'case-retail':{k:'Confidential case study',title:'Retail Business — GTA',intro:'Improving surveillance reliability, remote visibility, and operational network stability for a retail environment.',why:'The business needed better camera uptime, remote viewing, and improved network performance. The issue was not only security — unstable technology was affecting daily operations and visibility.',cards:[['Problem','Camera outages, weak remote access, network instability, and limited visibility across operations.'],['Solution','Centralized CCTV approach, secure remote viewing, network cleanup, and improved monitoring structure.'],['Result','Improved camera uptime, better operational visibility, and stronger control across locations.'],['Client privacy','Details remain confidential for privacy and security reasons.']],quote:'This type of project shows why IT and physical security should be planned together.'},
'case-office':{k:'Confidential case study',title:'Corporate Office — Mississauga',intro:'Creating a cleaner IT environment with Microsoft 365, endpoint protection, workstation setup, and support structure.',why:'The office needed better user account management, device setup, security, and support. The goal was to reduce recurring IT friction and create a more professional operating environment.',cards:[['Problem','Unmanaged workstations, inconsistent support, weak endpoint protection, and account confusion.'],['Solution','Microsoft 365 setup, device standardization, endpoint protection, backups, and support workflow.'],['Result','Faster onboarding, better productivity, stronger control, and fewer daily IT interruptions.'],['Client privacy','Details remain confidential for privacy and security reasons.']],quote:'Good office IT is quiet. It works in the background so the team can focus.'},
'case-warehouse':{k:'Confidential case study',title:'Warehouse — Brampton',intro:'Improving security coverage, access control, Wi-Fi reach, and operational visibility in a warehouse environment.',why:'Large spaces create coverage challenges. The business needed better camera placement, restricted access control, and more reliable connectivity throughout the site.',cards:[['Problem','Camera blind spots, weak Wi-Fi zones, restricted areas without access control, and limited visibility.'],['Solution','CCTV layout, access control, improved Wi-Fi coverage, and monitoring visibility.'],['Result','Better coverage, stronger access control, improved staff coordination, and reduced security gaps.'],['Client privacy','Details remain confidential for privacy and security reasons.']],quote:'Warehouse security is about visibility, control, and reliable connectivity across the full space.'},
'about':{k:'Company page',title:'About Smart Guard Innovations',intro:'A Canadian IT, network and security solutions company built for businesses that need reliability, accountability and long-term technology ownership.',why:'SGI combines practical field experience, engineering-minded problem solving and enterprise-style IT thinking. With around 10 years of combined experience across electronics, communication engineering, IT support, networking and security systems, the team is positioned to support businesses that want one trusted partner instead of many disconnected vendors.',cards:[['Engineering background','Founders with BTEC Electronics and Communication Engineering background and hands-on technology experience.'],['IT and enterprise exposure','Experience connected to IT support, infrastructure, enterprise environments and business technology operations.'],['Security and field delivery','Practical deployment experience across cameras, networking, cabling, access control and site-based technology.'],['Canada-wide mindset','Built to serve businesses across Canada with scalable solutions and clear communication.']],quote:'SGI is not positioned as only an installer. SGI is positioned as a long-term technology partner.'},
'partners':{k:'Authority page',title:'Authorized Technology Partners',intro:'SGI works with authorized technology partner ecosystems across networking, cybersecurity, surveillance, access control, automation and infrastructure.',why:'This section represents SGI’s technology capability layer — the platforms and systems we can deploy, configure, support and integrate for business environments.',cards:[['Networking and cybersecurity','Cisco, Fortinet and Ubiquiti platforms for reliable network, security and connectivity environments.'],['Surveillance and access','Hikvision, Dahua, Lorex and Honeywell systems for CCTV, access control and physical security.'],['Infrastructure and automation','Leviton, Crestron and related infrastructure platforms for structured environments and smarter spaces.'],['Client-first selection','Technology is selected based on project requirements, performance, security, budget and long-term supportability.']],quote:'Authorized partners show capability. Trusted industry logos show proof. SGI separates both clearly.'},
'solutions':{k:'Solutions page',title:'Solutions by Business Problem',intro:'Explore SGI solutions based on the problem your business needs to solve: downtime, security, network performance, visibility, growth or support.',why:'Business owners do not wake up wanting cabling, cameras or Microsoft 365 settings. They want fewer interruptions, better protection, easier operations and confidence that someone owns the system.',cards:[['Reduce downtime','Monitoring, better network design, managed support, backups and faster response workflows.'],['Secure your business','CCTV, access control, cybersecurity, endpoint protection, firewalls and secure access planning.'],['Upgrade your network','Structured cabling, Wi-Fi redesign, switching, routing, VLANs and multi-site connectivity.'],['Improve visibility','Camera coverage, remote viewing, monitoring, reporting and site-level operational awareness.']],quote:'The best website speaks in business problems first, then connects those problems to technology solutions.'},

function home(){return `${header()}<main><section class="hero"><div class="container"><div class="eyebrow">Enterprise IT • Network • Security • Surveillance</div><h1>Build a safer, smarter, more resilient business.</h1><p>Smart Guard Innovations brings IT, network, cybersecurity, cloud and physical security together into one accountable technology partner across Canada.</p><div class="actions"><a class="btn" href="#/contact">Book Free Assessment</a><a class="btn secondary" href="#/services">Explore Solutions</a></div></div></section><div class="container trust-row"><div>IT Solutions<span>Managed support and operations</span></div><div>Networking<span>Cabling, Wi-Fi and infrastructure</span></div><div>Security<span>Cybersecurity, CCTV and access</span></div><div>Canada-wide<span>Built for growing businesses</span></div></div>${logoStrip()}<section id="services"><div class="container"><div class="section-head"><div class="kicker">Solutions</div><h2>One partner for your complete technology environment.</h2><p>Each service opens into a full explanation page — business value, technical scope, delivery model and outcomes.</p></div>${serviceGrid()}</div></section><section class="feature-band"><div class="container feature-grid"><div class="feature-copy"><div class="kicker">The SGI Difference</div><h2>Not just installation. Long-term technology ownership.</h2><p>SGI positions your IT, network, cyber and physical security as one operating environment. That means better planning, fewer gaps, faster support and clearer accountability.</p><div class="mini-grid"><div class="mini"><strong>Strategy</strong><span>Business-first assessment</span></div><div class="mini"><strong>Architecture</strong><span>Systems designed together</span></div><div class="mini"><strong>Delivery</strong><span>Professional implementation</span></div><div class="mini"><strong>Support</strong><span>Ongoing ownership</span></div></div></div><div class="feature-visual"></div></div></section><section class="light"><div class="container"><div class="section-head"><div class="kicker">Business Impact</div><h2>Technology should drive growth — not slow it down.</h2><p>Businesses lose money through downtime, weak security, vendor complexity and outdated infrastructure. SGI helps convert technology from a cost center into a growth driver.</p></div><div class="stats"><div class="stat"><strong>90%</strong><span>Downtime reduction focus</span><p>Plan, monitor and support systems to reduce avoidable interruptions.</p></div><div class="stat"><strong>40%</strong><span>Productivity improvement target</span><p>Reduce the recurring technical friction that slows teams down.</p></div><div class="stat"><strong>70%</strong><span>Risk reduction approach</span><p>Improve visibility, backup planning, access control and security posture.</p></div></div></div></section><section class="light"><div class="container"><div class="section-head"><div class="kicker">Case Studies</div><h2>Confidential project stories. Real business problems.</h2><p>No fake client names. Each story focuses on the problem, solution and outcome.</p></div>${caseGrid()}</div></section><section class="dark"><div class="container"><div class="section-head"><div class="kicker">Process</div><h2>Simple process. Enterprise discipline.</h2><p>From consultation to assessment, custom solution and ongoing support.</p></div><div class="process-list"><div class="process-item"><strong>01</strong><div><h3>Consultation</h3><p>Understand business goals, sites, users, risks and current setup.</p></div><a href="#/contact">Start</a></div><div class="process-item"><strong>02</strong><div><h3>Assessment</h3><p>Identify gaps, weak points, downtime causes and security exposure.</p></div><a href="#/contact">Review</a></div><div class="process-item"><strong>03</strong><div><h3>Solution</h3><p>Create clear scope, pricing, priority and timeline.</p></div><a href="#/pricing">Options</a></div><div class="process-item"><strong>04</strong><div><h3>Deploy function serviceGrid(){let s=[['it-solutions','Managed IT Solutions','Support, Microsoft 365, devices, users, backups and daily operations.'],['network-infrastructure','Network Infrastructure','Cabling, Wi-Fi, firewalls, switches, VLANs and multi-site connectivity.'],['security-systems','Security & Surveillance','CCTV, access control, alarms, intercoms and monitoring visibility.'],['cybersecurity','Cybersecurity','Endpoint protection, firewalls, secure access, backups and hardening.'],['cloud-continuity','Cloud & Continuity','Microsoft 365, migration, remote access, backup and disaster recovery.'],['managed-support','Managed Support','Monitoring, documentation, maintenance, support workflow and improvement.']];return `<div class="solution-grid">${s.map((x,i)=>`<a class="service-card" href="#/service/${x[0]}"><div class="service-art"></div><div class="service-body"><small>0${i+1}</small><h3>${x[1]}</h3><p>${x[2]}</p><span class="link">Open full page →</span></div></a>`).join('')}</div>`}

function pricingCards(){return `<div class="price-grid"><div class="price-card"><h3>Essential</h3><div class="price">$499 <small>/ month</small></div><ul><li>Basic monitoring</li><li>Helpdesk support</li><li>System maintenance</li></ul></div><div class="price-card featured"><span class="badge">Most Popular</span><h3>Professional</h3><div class="price">$999 <small>/ month</small></div><ul><li>IT + network management</li><li>Security monitoring</li><li>Priority response</li></ul></div><div class="price-card"><h3>Enterprise</h3><div class="price">Custom</div><ul><li>Fully managed IT</li><li>Advanced cybersecurity</li><li>Dedicated planning</li></ul></div></div>`}
function contactSection(){return `<section class="cta" id="contact"><div class="container cta-grid"><div><div class="kicker">Free Assessment</div><h2>Let’s review your environment and build the right plan.</h2><p>SGI will help identify risks, gaps and opportunities across IT, network and security systems.</p><div class="contact-card"><strong>Smart Guard Innovations Inc.</strong><span>437-922-1449</span><span>289-892-5694</span><span>info@smartguardinnovations.ca</span><span>smartguardinnovations.ca</span></div></div><form class="lead-form" action="mailto:info@smartguardinnovations.ca" method="post" enctype="text/plain"><input name="Name" placeholder="Your name" required><input name="Company" placeholder="Company name"><input type="email" name="Email" placeholder="Email address" required><input name="Phone" placeholder="Phone number"><select name="Service"><option value="">What do you need help with?</option><option>IT Support</option><option>Network Infrastructure</option><option>Cybersecurity</option><option>Surveillance / Cameras</option><option>Full Assessment</option></select><textarea name="Message" placeholder="Briefly describe your requirement"></textarea><button class="btn" type="submit">Request Free Assessment</button><div class="small">This opens your email app so you can send the request directly.</div></form></div></section>`}
function servicePage(key){let p=pages[key];if(!p)return home();return `${header()}<main class="fade"><section class="page-hero"><div class="container"><div class="breadcrumb"><a href="#/">Home</a> / <a href="#/services">Services</a> / ${p.title}</div><h1>${p.title}</h1><p>${p.intro}</p><a class="btn" href="#/contact" style="margin-top:26px">Book Assessment</a></div></section><div class="page-nav"><div class="container"><a href="#overview">Overview</a><a href="#capabilities">Capabilities</a><a href="#delivery">Delivery</a><a href="#contact-block">Start</a></div></div><section id="overview" class="content-block"><div class="container content-grid"><div><div class="kicker">Overview</div><h2>Why this matters.</h2></div><div><p>${p.why}</p><div class="quote">${p.quote}</div></div></div></section><section id="capabilities" class="content-block"><div class="container content-grid"><div><div class="kicker">Capabilities</div><h2>What SGI delivers.</h2></div><div class="detail-cards">${p.cards.map(c=>`<div class="detail-card"><strong>${c[0]}</strong><span>${c[1]}</span></div>`).join('')}</div></div></section><section id="delivery" class="content-block light"><div class="container two-col"><div class="panel"><h3>How we approach delivery</h3><p>SGI starts with assessment, then builds a practical scope with timeline, priorities and support requirements. The objective is to reduce surprises and deliver a solution that works in real business conditions.</p><ul class="list"><li>Discovery and assessment</li><li>Clear scope and recommendation</li><li>Professional implementation</li><li>Testing, documentation and support</li></ul></div><div class="panel dark-panel"><h3>Expected business outcome</h3><p>Better reliability, stronger security, clearer accountability and an environment that is easier to support as your business grows.</p><a href="#/contact" class="btn" style="margin-top:24px">Discuss this service</a></div></div></section><div id="contact-block">${contactSection()}</div></main>${footer()}`}
function listPage(type){if(type==='services')return `${header()}<main class="fade"><section class="page-hero"><div class="container"><div class="breadcrumb"><a href="#/">Home</a> / Services</div><h1>Enterprise IT, Network & Security Services</h1><p>Open any service below for a complete explanation page.</p></div></section><section><div class="container">${serviceGrid()}</div></section></main>${footer()}`;if(type==='industries')return servicePage('industries');if(type==='about')return servicePage('about');if(type==='partners')return servicePage('partners');if(type==='solutions')return servicePage('solutions');if(type==='resources')return servicePage('resources');if(type==='case-studies')return `${header()}<main class="fade"><section class="page-hero"><div class="container"><div class="breadcrumb"><a href="#/">Home</a> / Case Studies</div><h1>Confidential Case Studies</h1><p>Real-style project stories presented without fake client names.</p></div></section><section class="light"><div class="container">${caseGrid()}</div></section></main>${footer()}`;if(type==='pricing')return `${header()}<main class="fade"><section class="page-hero"><div class="container"><div class="breadcrumb"><a href="#/">Home</a> / Pricing</div><h1>Pricing and Engagement Options</h1><p>Clear starting points for monthly support and custom project work.</p></div></section><section class="light"><div class="container">${pricingCards()}</div></section>${contactSection()}</main>${footer()}`;if(type==='contact')return `${header()}<main class="fade"><section class="page-hero"><div class="container"><div class="breadcrumb"><a href="#/">Home</a> / Contact</div><h1>Book your free IT assessment.</h1><p>Tell us what you need help with. We’ll review your situation and recommend the best next step.</p></div></section>${contactSection()}</main>${footer()}`;return home()}
function render(){let route=location.hash.replace('#/','')||'';let app=document.getElementById('app');if(route.startsWith('service/'))app.innerHTML=servicePage(route.split('/')[1]);else if(pages[route])app.innerHTML=servicePage(route);else if(['services','about','solutions','partners','resources','industries','case-studies','pricing','contact'].includes(route))app.innerHTML=listPage(route);else app.innerHTML=home();window.scrollTo(0,0)}
window.addEventListener('hashchange',render);render();
</script>
