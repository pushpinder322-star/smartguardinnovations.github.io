function toggleMenu(force){
  let p=document.getElementById('mobilePanel'); if(!p)return;
  let open=typeof force==='boolean'?force:p.style.display!=='block';
  p.style.display=open?'block':'none';
}

function normalizeRoute(){
  let route=location.hash.replace(/^#\/?/,'').replace(/^\/+/,'').replace(/\/$/,'');
  return route;
}

function render(){
  let route=normalizeRoute();
  let app=document.getElementById('app');
  if(!route){app.innerHTML=home();}
  else if(route==='services'){app.innerHTML=servicesList();}
  else if(route.startsWith('services/')){app.innerHTML=servicePage(route.split('/')[1]);}
  else if(route.startsWith('service/')){app.innerHTML=servicePage(route.split('/')[1]);}
  else if(route==='pricing'){app.innerHTML=pricingPage();}
  else if(route==='contact'){app.innerHTML=contactPage();}
  else if(route==='case-studies'){app.innerHTML=caseStudiesPage();}
  else if(pages[route]){app.innerHTML=servicePage(route);}
  else if(cases.find(c=>c.slug===route)){app.innerHTML=servicePage(route);}
  else if(aliases[route]){app.innerHTML=servicePage(route);}
  else{app.innerHTML=notFound();}
  window.scrollTo(0,0);
}
window.addEventListener('hashchange',render);
render();
</script>
