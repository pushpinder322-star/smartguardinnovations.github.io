<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Guard Innovations</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#020617;color:#fff;overflow-x:hidden}
header{position:fixed;width:100%;top:0;background:rgba(2,6,23,0.8);backdrop-filter:blur(10px);z-index:1000;padding:15px 40px}
header nav{display:flex;justify-content:space-between;align-items:center}
.brand{font-weight:700;font-size:20px}
.hero{height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;background:radial-gradient(circle at center,#0ea5e9 0%,#020617 60%)}
.hero h1{font-size:56px;line-height:1.1}
.hero p{margin-top:20px;color:#94a3b8;font-size:18px}
.btn{margin-top:30px;padding:14px 28px;border-radius:30px;border:none;background:#0ea5e9;color:#fff;cursor:pointer;font-weight:600}
.section{padding:100px 40px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:25px}
.card{background:rgba(255,255,255,0.05);padding:25px;border-radius:20px;transition:0.3s;cursor:pointer}
.card:hover{transform:translateY(-10px);background:rgba(14,165,233,0.15)}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center}
.modal-content{background:#0f172a;padding:40px;border-radius:20px;max-width:600px;width:90%}
.close{margin-top:20px;cursor:pointer;color:#0ea5e9}
footer{text-align:center;padding:40px;color:#64748b}
</style>
</head>
<body>
<header>
<nav>
<div class="brand">SGI</div>
<div>Smart Guard Innovations</div>
</nav>
</header>

<section class="hero">
<div>
<h1>Secure. Optimize. Scale.</h1>
<p>Enterprise IT & Security Solutions Across Canada</p>
<button class="btn">Get Free Assessment</button>
</div>
</section>

<section class="section">
<h2>Real Case Studies</h2>
<div class="grid">
<div class="card" onclick="openModal('retail')">Retail Business — GTA</div>
<div class="card" onclick="openModal('office')">Corporate Office — Mississauga</div>
<div class="card" onclick="openModal('warehouse')">Warehouse — Brampton</div>
</div>
</section>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<footer>
© 2026 Smart Guard Innovations Inc.
</footer>

<script>
const data={
retail:{title:'Retail Business — GTA',text:'Improved CCTV, network stability, and remote monitoring. Result: Better control, fewer outages, smoother operations.'},
office:{title:'Corporate Office — Mississauga',text:'Full IT setup with Microsoft 365 and security. Result: Higher productivity and secure environment.'},
warehouse:{title:'Warehouse — Brampton',text:'CCTV, access control, and WiFi coverage. Result: Full visibility and improved security.'}
}
function openModal(key){
const modal=document.getElementById('modal')
const content=document.getElementById('modalContent')
content.innerHTML=`<h2>${data[key].title}</h2><p style='margin-top:15px'>${data[key].text}</p><div class='close' onclick='closeModal()'>Close</div>`
modal.style.display='flex'
}
function closeModal(){document.getElementById('modal').style.display='none'}
</script>

</body>
</html>
