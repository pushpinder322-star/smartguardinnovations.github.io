'it-solutions':{title:'Managed IT Solutions',k:'Service page',img:images.it,intro:'Reliable daily technology support for businesses that need systems to run smoothly, employees to stay productive, and issues handled quickly.',why:'Modern companies depend on computers, accounts, cloud tools, printers, files, backups, and security. SGI creates a cleaner support structure so your team knows who to call and how problems are handled.',quote:'The goal is not only to fix IT problems. The goal is to make technology feel stable, supported, and predictable.',cards:[['Helpdesk and user support','Remote and onsite support for users, devices, email, printers, and daily IT needs.'],['Microsoft 365 management','Email, users, groups, permissions, OneDrive, SharePoint, Teams, and secure collaboration.'],['Endpoint management','Workstation setup, updates, security tools, onboarding, offboarding, and lifecycle support.'],['Backup and continuity','Backup and recovery planning so important files and systems are protected.']]},
'network-infrastructure':{title:'Network Infrastructure',k:'Service page',img:images.network,intro:'Professional network design, cabling, Wi-Fi, switching, routing, firewalls, and connectivity planning.',why:'Your network is the foundation of POS, cameras, phones, cloud tools, staff devices, access control, and security. SGI designs network environments with coverage, speed, segmentation, security, and future growth in mind.',quote:'A strong network is invisible. People only notice the network when it fails.',cards:[['Structured cabling','Clean cabling, rack organization, labeling, patching, and professional installation.'],['Wi-Fi design','Access point placement, coverage planning, roaming, guest networks, and tuning.'],['Switching and routing','Business-grade switching, VLAN planning, routing, and firewall integration.'],['Multi-site connectivity','Planning for multiple sites, remote users, central management, and secure access.']]},
'security-systems':{title:'Security & Surveillance Systems',k:'Service page',img:images.security,intro:'CCTV, access control, intercoms, alarms, monitoring, and physical security planning.',why:'Security is more than installing cameras. It is about coverage, access, monitoring, permissions, and making sure the system is usable when something happens.',quote:'The value of a security system is what you can see, control, and prove when it matters.',cards:[['CCTV surveillance','Camera placement, NVR setup, remote viewing, recording configuration, and coverage planning.'],['Access control','Door access, restricted areas, user permissions, and site control.'],['Monitoring and visibility','Remote access, alerts, system health, and easier event management.'],['Integrated planning','Network, power, cabling, storage, and access planned together.']]},
'cybersecurity':{title:'Cybersecurity & Risk Reduction',k:'Service page',img:images.cyber,intro:'Protect your business from cyber threats, data loss, unauthorized access, and operational risks with structured security systems.',why:'Most businesses are exposed without knowing it — weak passwords, shared accounts, no backups, outdated systems, open remote access, and zero monitoring. SGI builds a layered security approach that protects users, devices, and data.',quote:'Cybersecurity is not a tool. It is a system that must be designed, enforced, and maintained.',cards:[['Endpoint protection','Advanced protection for laptops, desktops, and business devices against malware and threats.'],['Firewall & network security','Secure your network with firewall rules, segmentation, and controlled access.'],['Identity & access control','Microsoft 365 security, MFA, admin control, user permissions and account protection.'],['Backup & ransomware protection','Secure backups and recovery systems to protect against data loss and attacks.'],['Security audit & assessment','Identify risks, weak points and create a clear improvement plan.'],['Staff security awareness','Reduce human risk with basic training against phishing and attacks.']]},
'cloud-continuity':{title:'Cloud & Business Continuity',k:'Service page',img:images.cloud,intro:'Move your business to the cloud with secure access, reliable backups, remote work capability, and continuity planning.',why:'Many businesses depend on local systems that break, get lost, or stop working during failures. Cloud systems allow access from anywhere, improve collaboration, and reduce downtime when properly configured.',quote:'Cloud is not just storage — it is your business continuity system.',cards:[['Microsoft 365 setup','Email, Teams, SharePoint, OneDrive with proper configuration and security.'],['Cloud migration','Move files, email, and systems from local servers to cloud environments.'],['Remote work setup','Secure remote access for staff without exposing your systems.'],['Backup & disaster recovery','Ensure business can recover quickly from failure or data loss.'],['Device & user sync','Access files across devices with proper control and permissions.'],['Continuity planning','Keep operations running even during outages or disruptions.']]},
'managed-support':{title:'Managed Support',k:'Service page',img:images.support,intro:'Ongoing support, monitoring, documentation, maintenance, and improvement after installation.',why:'One-time installation is not enough. Systems need updates, user changes, monitoring, documentation, and improvement.',quote:'The difference between a vendor and a partner appears after installation.',cards:[['Support workflow','Clear path for employees and managers when issues appear.'],['Monitoring and maintenance','Health checks, updates, backups, and recurring review.'],['Documentation','Cleaner records of systems, devices, networks, and configurations.'],['Continuous improvement','Technology evolves with the business.']]},
'about':{title:'About Smart Guard Innovations',k:'Company page',img:images.office,intro:'A Canadian IT, network and security solutions company built for reliability and long-term technology ownership.',why:'SGI combines field experience, engineering-minded problem solving and enterprise-style IT thinking.',quote:'SGI is positioned as a long-term technology partner.',cards:[['Engineering background','Practical technology and communication systems experience.'],['Enterprise exposure','IT support, infrastructure, and business technology operations.'],['Field delivery','Cameras, networking, cabling, access control, and site technology.'],['Canada-wide mindset','Built for scalable solutions and clear communication.']]},
'partners':{title:'Authorized Technology Partners',k:'Authority page',img:images.office,intro:'SGI works with partner ecosystems across networking, cybersecurity, surveillance, access control and infrastructure.',why:'This section represents SGI’s technology capability layer.',quote:'Authorized partners show capability. Trusted logos show proof.',cards:[['Networking and cybersecurity','Cisco, Fortinet and Ubiquiti platforms.'],['Surveillance and access','Hikvision, Dahua, Lorex and Honeywell systems.'],['Infrastructure','Leviton and related infrastructure platforms.'],['Client-first selection','Technology selected by requirements, security, budget and supportability.']]},
'solutions':{title:'Solutions by Business Problem',k:'Solutions page',img:images.office,intro:'Explore SGI solutions based on downtime, security, network performance, visibility, growth or support.',why:'Business owners want fewer interruptions, better protection, easier operations and confidence that someone owns the system.',quote:'The best website speaks in business problems first.',cards:[['Reduce downtime','Monitoring, better network design, support and backups.'],['Secure your business','CCTV, access control, cybersecurity and firewalls.'],['Upgrade your network','Cabling, Wi-Fi redesign, switching, routing and VLANs.'],['Improve visibility','Camera coverage, remote viewing, reporting and site awareness.']]},
'industries':{title:'Industries We Support',k:'Industry page',img:images.warehouse,intro:'Technology and security solutions for offices, warehouses, retail, clinics, logistics, and small businesses.',why:'Different industries need different outcomes. SGI adapts the plan to the environment.',quote:'The right solution depends on the environment, not just the technology.',cards:[['Offices','Managed IT, Microsoft 365, Wi-Fi and endpoint protection.'],['Warehouses','CCTV coverage, access control and long-range Wi-Fi.'],['Retail','POS stability, cameras, remote viewing and guest Wi-Fi.'],['Professional services','Secure access, backup, privacy-conscious IT support and Wi-Fi.']]},
'resources':{title:'Insights & Guides',k:'Resources page',img:images.office,intro:'Practical guides for business owners who want to understand IT, network and security decisions.',why:'Resources position SGI as an advisor, not just a vendor.',quote:'Education builds trust. Trust creates better sales conversations.',cards:[['Network warning signs','Slow Wi-Fi, poor coverage and outages indicate infrastructure issues.'],['CCTV + IT','Modern cameras depend on network quality, storage and secure access.'],['IT assessment','Review risk, uptime, support gaps, backups and security posture.'],['Managed support','Proactive support reduces surprises and repeated problems.']]},
'case-retail':{title:'Retail Business — GTA',k:'Case study',img:images.retail,intro:'Improving surveillance reliability, remote visibility, and network stability.',why:'The business needed better camera uptime, remote viewing, and improved network performance.',quote:'IT and physical security should be planned together.',cards:[['Problem','Camera outages, weak remote access, network instability.'],['Solution','Centralized CCTV, secure remote viewing and network cleanup.'],['Result','Improved uptime, visibility and control.'],['Privacy','Details remain confidential.']]},
'case-office':{title:'Corporate Office — Mississauga',k:'Case study',img:images.office,intro:'Creating a cleaner IT environment with Microsoft 365 and support structure.',why:'The office needed better user account management, device setup, security, and support.',quote:'Good office IT works quietly in the background.',cards:[['Problem','Unmanaged workstations and inconsistent support.'],['Solution','Microsoft 365, device standardization and endpoint protection.'],['Result','Faster onboarding and fewer interruptions.'],['Privacy','Details remain confidential.']]},
'case-warehouse':{title:'Warehouse — Brampton',k:'Case study',img:images.warehouse,intro:'Improving security coverage, access control, Wi-Fi reach, and visibility.',why:'Large spaces create coverage challenges.',quote:'Warehouse security is about visibility, control, and reliable connectivity.',cards:[['Problem','Camera blind spots and weak Wi-Fi zones.'],['Solution','CCTV layout, access control and improved Wi-Fi.'],['Result','Better coverage and fewer security gaps.'],['Privacy','Details remain confidential.']]}

ical security as one operating environment.</p><div class="mini-grid"><div class="mini"><strong>Strategy</strong><span>Business-first assessment</span></div><div class="mini"><strong>Architecture</strong><span>Systems designed together</span></div><div class="mini"><strong>Delivery</strong><span>Professional implementation</span></div><div class="mini"><strong>Support</strong><span>Ongoing ownership</span></div></div></div><div class="feature-visual"><div class="feature-line line-1"></div><div class="feature-line line-2"></div><div class="feature-line line-3"></div><div class="feature-line line-4"></div><div class="feature-line line-5"></div><div class="feature-core">SGI<span>Operating Layer</span></div><div class="feature-node node-1"><small>01</small>Cloud</div><div class="feature-node node-2"><small>02</small>Network</div><div class="feature-node node-3"><small>03</small>Cyber</div><div class="feature-node node-4"><small>04</small>CCTV</div><div class="feature-node node-5"><small>05</small>IT Support</div></div></div></section><section class="light"><div class="container"><div class="section-head"><div class="kicker">Business Impact</div><h2>Technology should drive growth — not slow it down.</h2><p>SGI helps convert technology from a cost center into a growth driver.</p></div><div class="grid-3"><div class="stat"><strong>90%</strong><span>Downtime reduction focus</span><p>Reduce avoidable interruptions.</p></div><div class="stat"><strong>40%</strong><span>Productivity improvement target</span><p>Reduce recurring technical friction.</p></div><div class="stat"><strong>70%</strong><span>Risk reduction approach</span><p>Improve visibility, backup and security posture.</p></div></div></div></section><section class="light"><div class="container"><div class="section-head"><div class="kicker">Case Studies</div><h2>Confidential project stories.</h2><p>No fake client names. Each story focuses on problem, solution and outcome.</p></div>'+caseGrid()+'</div></section><section ><li>Professional implementation</li><li>Testing, documentation and support</li></ul></div><div class="panel dark-panel"><h3>Expected business outcome</h3><p>Better reliability, stronger security, clearer accountability and an environment that is easier to support as your business grows.</p><a href="#/contact" class="btn" style="margin-top:24px">Discuss this service</a></div></div></section><div id="contact-block">'+contactSection()+'</div></main>'+footer()}

<script>
const logo='images/logo.png';
const imgFallback='https://images.unsplash.com/photo-1497366811353-6870744d04b2?auto=format&fit=crop&w=1200&q=85';
const images={hero:'https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1600&q=90',it:'https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1200&q=85',network:'https://images.unsplash.com/photo-1558494949-ef010cbdcc31?auto=format&fit=crop&w=1200&q=85',security:'https://images.unsplash.com/photo-1557597774-9d273605dfa9?auto=format&fit=crop&w=1200&q=85',cyber:'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1200&q=85',cloud:'https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1200&q=85',support:'https://images.unsplash.com/photo-1553877522-43269d4ea984?auto=format&fit=crop&w=1200&q=85',retail:'https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?auto=format&fit=crop&w=1200&q=85',office:'https://images.unsplash.com/photo-1497366811353-6870744d04b2?auto=format&fit=crop&w=1200&q=85',warehouse:'https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=1200&q=85'};
const partners=[['images/cisco.png','Cisco'],['images/fortinet.png','Fortinet'],['images/hikvision.png','Hikvision'],['images/dahua.png','Dahua'],['images/honeywell.png','Honeywell'],['images/ubiquiti.png','Ubiquiti'],['images/lorex.png','Lorex'],['images/leviton.png','Leviton']];
const clients=[['images/client1.png','Client 1'],['images/client2.png','Client 2'],['images/client3.png','Client 3'],['images/client4.png','Client 4'],['images/client5.png','Client 5'],['images/client6.png','Client 6']];
const serviceData=[['it-solutions','Managed IT Solutions','Support, Microsoft 365, devices, users, backups and daily operations.',images.it],['network-infrastructure','Network Infrastructure','Cabling, Wi-Fi, firewalls, switches, VLANs and multi-site connectivity.',images.network],['security-systems','Security & Surveillance','CCTV, access control, alarms, intercoms and monitoring visibility.',images.security],['cybersecurity','Cybersecurity','Endpoint protection, firewalls, secure access, backups and hardening.',images.cyber],['cloud-continuity','Cloud & Continuity','Microsoft 365, migration, remote access, backup and disaster recovery.',images.cloud],['managed-support','Managed Support','Monitoring, documentation, maintenance, support workflow and improvement.',images.support]];
const pageInfo={
'it-solutions':{title:'Managed IT Solutions',k:'Service page',img:images.it,intro:'Reliable daily technology support for businesses that need systems to run smoothly, employees to stay productive, and issues handled quickly.',why:'Modern companies depend on computers, accounts, cloud tools, printers, files, backups, and security. SGI creates a cleaner support structure so your team knows who to call and how problems are handled.',quote:'The goal is not only to fix IT problems. The goal is to make technology feel stable, supported, and predictable.',cards:[['Helpdesk and user support','Remote and onsite support for users, devices, email, printers, and daily IT needs.'],['Microsoft 365 management','Email, users, groups, permissions, OneDrive, SharePoint, Teams, and secure collaboration.'],['Endpoint management','Workstation setup, updates, security tools, onboarding, offboarding, and lifecycle support.'],['Backup and continuity','Backup and recovery planning so important files and systems are protected.']]},
'network-infrastructure':{title:'Network Infrastructure',k:'Service page',img:images.network,intro:'Professional network design, cabling, Wi-Fi, switching, routing, firewalls, and connectivity planning.',why:'Your network is the foundation of POS, cameras, phones, cloud tools, staff devices, access control, and security. SGI designs network environments with coverage, speed, segmentation, security, and future growth in mind.',quote:'A strong network is invisible. People only notice the network when it fails.',cards:[['Structured cabling','Clean cabling, rack organization, labeling, patching, and professional installation.'],['Wi-Fi design','Access point placement, coverage planning, roaming, guest networks, and tuning.'],['Switching and routing','Business-grade switching, VLAN planning, routing, and firewall integration.'],['Multi-site connectivity','Planning for multiple sites, remote users, central management, and secure access.']]},
'security-systems':{title:'Security & Surveillance Systems',k:'Service page',img:images.security,intro:'CCTV, access control, intercoms, alarms, monitoring, and physical security planning.',why:'Security is more than installing cameras. It is about coverage, access, monitoring, permissions, and making sure the system is usable when something happens.',quote:'The value of a security system is what you can see, control, and prove when it matters.',cards:[['CCTV surveillance','Camera placement, NVR setup, remote viewing, recording configuration, and coverage planning.'],['Access control','Door access, restricted areas, user permissions, and site control.'],['Monitoring and visibility','Remote access, alerts, system health, and easier event management.'],['Integrated planning','Network, power, cabling, storage, and access planned together.']]},
'cybersecurity':{title:'Cybersecurity & Risk Reduction',k:'Service page',img:images.cyber,intro:'Protect your business from cyber threats, data loss, unauthorized access, and operational risks with structured security systems.',why:'Most businesses are exposed without knowing it — weak passwords, shared accounts, no backups, outdated systems, open remote access, and zero monitoring. SGI builds a layered security approach that protects users, devices, and data.',quote:'Cybersecurity is not a tool. It is a system that must be designed, enforced, and maintained.',cards:[['Endpoint protection','Advanced protection for laptops, desktops, and business devices against malware and threats.'],['Firewall & network security','Secure your network with firewall rules, segmentation, and controlled access.'],['Identity & access control','Microsoft 365 security, MFA, admin control, user permissions and account protection.'],['Backup & ransomware protection','Secure backups and recovery systems to protect against data loss and attacks.'],['Security audit & assessment','Identify risks, weak points and create a clear improvement plan.'],['Staff security awareness','Reduce human risk with basic training against phishing and attacks.']]},
'cloud-continuity':{title:'Cloud & Business Continuity',k:'Service page',img:images.cloud,intro:'Move your business to the cloud with secure access, reliable backups, remote work capability, and continuity planning.',why:'Many businesses depend on local systems that break, get lost, or stop working during failures. Cloud systems allow access from anywhere, improve collaboration, and reduce downtime when properly configured.',quote:'Cloud is not just storage — it is your business continuity system.',cards:[['Microsoft 365 setup','Email, Teams, SharePoint, OneDrive with proper configuration and security.'],['Cloud migration','Move files, email, and systems from local servers to cloud environments.'],['Remote work setup','Secure remote access for staff without exposing your systems.'],['Backup & disaster recovery','Ensure business can recover quickly from failure or data loss.'],['Device & user sync','Access files across devices with proper control and permissions.'],['Continuity planning','Keep operations running even during outages or disruptions.']]},
'managed-support':{title:'Managed Support',k:'Service page',img:images.support,intro:'Ongoing support, monitoring, documentation, maintenance, and improvement after installation.',why:'One-time installation is not enough. Systems need updates, user changes, monitoring, documentation, and improvement.',quote:'The difference between a vendor and a partner appears after installation.',cards:[['Support workflow','Clear path for employees and managers when issues appear.'],['Monitoring and maintenance','Health checks, updates, backups, and recurring review.'],['Documentation','Cleaner records of systems, devices, networks, and configurations.'],['Continuous improvement','Technology evolves with the business.']]},

><li>Professional implementation</li><li>Testing, documentation and support</li></ul></div><div class="panel dark-panel"><h3>Expected business outcome</h3><p>Better reliability, stronger security, clearer accountability and an environment that is easier to support as your business grows.</p><a href="#/contact" class="btn" style="margin-top:24px">Discuss this service</a></div></div></section><div id="contact-block">'+contactSection()+'</div></main>'+footer()}
